name: Core - Reusable Agent Run

on:
  workflow_call:
    inputs:
      run-name:
        description: 'Name of the run (e.g., security, safety, performance)'
        required: true
        type: string
      prompt:
        description: 'The prompt content to use for the run (mutually exclusive with prompt-file)'
        required: false
        type: string
      prompt-file:
        description: 'Path to the prompt file (e.g., .github/prompts/security.prompt.md) (mutually exclusive with prompt)'
        required: false
        type: string
      timeout-minutes:
        description: 'Timeout for the run job in minutes'
        required: false
        type: number
        default: 120
      model:
        description: 'OpenCode model to use for the run'
        required: false
        type: string
        default: 'opencode/big-pickle'
      agent:
        description: 'Agent to use for OpenCode run'
        required: false
        type: string
        default: 'build'
      command:
        description: 'Command to use for OpenCode run (alternative to prompt/prompt-file)'
        required: false
        type: string
      git-user-name:
        description: 'Optional local git user.name for agent-created commits'
        required: false
        type: string
        default: ''
      git-user-email:
        description: 'Optional local git user.email for agent-created commits'
        required: false
        type: string
        default: ''
      cli:
        description: 'Agent CLI to use for the run (e.g. opencode)'
        required: false
        type: string
        default: 'opencode'
      runner:
        description: 'Runner to use for the job'
        required: false
        type: string
        default: 'ubuntu-latest'
      http-proxy:
        description: 'Optional HTTP proxy for network operations'
        required: false
        type: string
        default: ''
      https-proxy:
        description: 'Optional HTTPS proxy for network operations'
        required: false
        type: string
        default: ''
      no-proxy:
        description: 'Optional comma-separated hosts that bypass proxies'
        required: false
        type: string
        default: ''
    outputs:
      results:
        description: 'The output results from OpenCode (truncated if too large)'
        value: ${{ jobs.run.outputs.results }}
      results-truncated:
        description: 'Whether the results were truncated due to size'
        value: ${{ jobs.run.outputs.results-truncated }}
      artifact-name:
        description: 'Name of the uploaded artifact containing full results'
        value: ${{ jobs.run.outputs.artifact-name }}

env:
  MAX_OUTPUT_LINES: 50

jobs:
  run:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    outputs:
      results: ${{ steps.process-results.outputs.results }}
      results-truncated: ${{ steps.process-results.outputs.results-truncated }}
      artifact-name: ${{ steps.process-results.outputs.artifact-name }}
    env:
      GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
      HTTP_PROXY: ${{ inputs['http-proxy'] }}
      HTTPS_PROXY: ${{ inputs['https-proxy'] }}
      NO_PROXY: ${{ inputs['no-proxy'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup and Install Agent CLI
        run: |
          CLI="${{ inputs.cli }}"
          case "$CLI" in
            opencode)
              if command -v opencode >/dev/null 2>&1 && opencode --version >/dev/null 2>&1; then
                echo "OpenCode is already installed and working"
                opencode --version
              else
                echo "OpenCode not found or not working, installing..."

                echo "System information:"
                echo "OS: $(uname -s)"
                echo "Arch: $(uname -m)"
                echo "Node.js version: $(node --version)"
                echo "npm version: $(npm --version)"

                if ! npm i -g opencode-ai@latest; then
                  echo "ERROR: OpenCode installation failed"
                  echo "Checking npm global bin directory:"
                  npm bin -g || echo "npm bin -g failed"
                  exit 1
                fi

                echo "OpenCode installation completed"

                if ! opencode --version; then
                  echo "ERROR: OpenCode installation verification failed"
                  echo "Checking npm global packages:"
                  npm list -g --depth=0 | grep opencode || echo "opencode-ai not found in global packages"
                  echo "npm global bin directory:"
                  npm bin -g || echo "npm bin -g failed"
                  exit 1
                fi
              fi
              ;;
            *)
              echo "ERROR: Unknown agent CLI '$CLI'. Valid values: opencode"
              exit 1
              ;;
          esac

      - name: Configure git identity
        if: inputs['git-user-name'] != '' && inputs['git-user-email'] != ''
        run: |
          git config user.name "${{ inputs['git-user-name'] }}"
          git config user.email "${{ inputs['git-user-email'] }}"

      - name: Write prompt to file
        if: inputs.prompt != ''
        env:
          PROMPT_CONTENT: ${{ inputs.prompt }}
        run: printf '%s' "$PROMPT_CONTENT" > _prompt.txt

      - name: Run Agent CLI ${{ inputs.run-name }}
        run: |
          CLI="${{ inputs.cli }}"
          CMD="${{ inputs.command }}"
          MODEL="${{ inputs.model }}"
          AGENT="${{ inputs.agent }}"
          OUT="${{ inputs.run-name }}-results.txt"

          if [ -f "_prompt.txt" ]; then
            PROMPT_SRC="_prompt.txt"
          elif [ -n "${{ inputs.prompt-file }}" ]; then
            PROMPT_SRC="${{ inputs.prompt-file }}"
          else
            PROMPT_SRC=""
          fi

          case "$CLI" in
            opencode)
              if [ -n "$CMD" ]; then
                if [ -n "$PROMPT_SRC" ]; then
                  opencode run --command "$CMD" --model "$MODEL" --agent "$AGENT" < "$PROMPT_SRC" > "$OUT"
                else
                  opencode run --command "$CMD" --model "$MODEL" --agent "$AGENT" > "$OUT"
                fi
              elif [ -n "$PROMPT_SRC" ]; then
                opencode run --model "$MODEL" --agent "$AGENT" < "$PROMPT_SRC" > "$OUT"
              else
                echo "Error: At least one of 'command', 'prompt', or 'prompt-file' must be provided" >&2
                exit 1
              fi
              ;;
            *)
              echo "ERROR: Unknown agent CLI '$CLI'. Valid values: opencode"
              exit 1
              ;;
          esac

      - name: Cleanup transient prompt file
        if: always()
        run: rm -f _prompt.txt

      - name: Collect OpenCode session data
        if: always()
        run: |
          OPENCODE_DIR="$HOME/.local/share/opencode"
          if [ -d "$OPENCODE_DIR" ]; then
            mkdir -p gh-artifacts
            # Zip session data, excluding sensitive credentials and large/unnecessary dirs
            zip -r gh-artifacts/opencode-session.zip "$OPENCODE_DIR" \
              --exclude "$OPENCODE_DIR/auth.json" \
              --exclude "$OPENCODE_DIR/mcp-auth.json" \
              --exclude "$OPENCODE_DIR/bin/*" \
              --exclude "$OPENCODE_DIR/repos/*" \
              || echo "WARNING: zip failed, skipping opencode session data"
          else
            echo "OpenCode data directory not found, skipping"
          fi

      - name: Process results for output
        id: process-results
        if: always()
        run: |
          RESULTS_FILE="${{ inputs.run-name }}-results.txt"
          ARTIFACT_NAME="gh-artifacts-${{ github.run_id }}"

          mkdir -p gh-artifacts

          if [ -f "$RESULTS_FILE" ]; then
            cp "$RESULTS_FILE" gh-artifacts/
            FILE_SIZE=$(wc -c < "$RESULTS_FILE")
            MAX_SIZE=65000

            echo "artifact-name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

            if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
              echo "results-truncated=true" >> "$GITHUB_OUTPUT"

              {
                echo "# OpenCode Results (Truncated)"
                echo ""
                echo "⚠️ **Results were truncated due to size limits. Full results are available in the artifact.**"
                echo ""
                echo "**File size:** $FILE_SIZE bytes (limit: $MAX_SIZE bytes)"
                echo ""
                echo "---"
                echo ""
                head -c "$((MAX_SIZE - 1000))" "$RESULTS_FILE"
                echo ""
                echo ""
                echo "..."
                echo ""
                echo "**[Full results available in artifact: $ARTIFACT_NAME]**"
              } > truncated-results.txt

              {
                echo "results<<EOF"
                cat truncated-results.txt
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "results-truncated=false"
                echo "results<<EOF"
                cat "$RESULTS_FILE"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            {
              echo "results-truncated=false"
              echo "results=❌ No results file generated"
              echo "artifact-name=$ARTIFACT_NAME"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Upload gh-artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gh-artifacts-${{ github.run_id }}
          path: gh-artifacts/
          if-no-files-found: ignore
