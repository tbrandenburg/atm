  runner: ubuntu-latest
  timeout_minutes: 120
  cli: opencode
  proxy:
    http: ""
    https: ""
    no_proxy: ""

max_wip: 5

agents:
  planner:
    model: opencode/big-pickle
    runner: ubuntu-latest
    timeout_minutes: 60
    cli: opencode
  worker:
    model: opencode/big-pickle
    runner: ubuntu-latest
    timeout_minutes: 120
    cli: opencode
  quality:
    model: opencode/big-pickle
    runner: ubuntu-latest
    timeout_minutes: 60
    cli: opencode
  integrator:
    model: opencode/big-pickle
    runner: ubuntu-latest
    timeout_minutes: 60
    cli: opencode
